# ============================================================================
# Nexus 3 Architecture: SSD (System) + S3 (Blobs)
# ============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: nexus

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-data-ssd
  namespace: nexus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: 
            - sh
            - -c
            - |
              # 1. Создаем структуру директорий
              mkdir -p /nexus-data/blobs /nexus-data/javaprefs /nexus-data/etc/logback
              
              # 2. Удаляем ВСЕ файлы блокировок (главная причина ошибки)
              echo "Cleaning up lock files..."
              rm -f /nexus-data/lock
              rm -f /nexus-data/nexus.lock
              rm -f /nexus-data/db/*.lock
              find /nexus-data -name "*.lock" -delete
              find /nexus-data -name "lock" -delete
              
              # 3. Принудительно ставим INFO в логи, если был DEBUG
              if [ -f /nexus-data/etc/logback/logback-nexus.xml ]; then
                sed -i 's/level="DEBUG"/level="INFO"/g' /nexus-data/etc/logback/logback-nexus.xml
                sed -i 's/level="TRACE"/level="INFO"/g' /nexus-data/etc/logback/logback-nexus.xml
              fi
              
              # 4. Исправляем права (владелец 200 - это nexus)
              chown -R 200:200 /nexus-data
              chmod -R 755 /nexus-data
              echo "Init cleanup finished."
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: nexus-data-ssd
              mountPath: /nexus-data
        - name: configure-docker-connector
          image: busybox:1.36
          command:
          - sh
          - -c
          - |
            cat > /nexus-data/etc/nexus.properties << 'EOF'
            # УДАЛЕНО: jetty-https.xml, так как SSL делает Ingress
            nexus-args=${jetty.etc}/jetty.xml,${jetty.etc}/jetty-requestlog.xml
            application-port=8081
            application-port-ssl=8443
            nexus.docker.enabled=true
            nexus.docker.v2.enabled=true
            nexus.docker.v2.port=5000
            EOF
            chown 200:200 /nexus-data/etc/nexus.properties
            chmod 644 /nexus-data/etc/nexus.properties
          volumeMounts:
          - name: nexus-data-ssd
            mountPath: /nexus-data
      containers:
        - name: nexus
          image: sonatype/nexus3:3.69.0
          securityContext:
            runAsUser: 200
            runAsGroup: 200
          ports:
            - containerPort: 8081
              name: ui
            - containerPort: 5000
              name: docker-hosted
          env:
            - name: NEXUS_CONTEXT
              value: "/"
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms2g -Xmx2g -XX:+UseG1GC -Djava.util.prefs.userRoot=/nexus-data/javaprefs -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "8Gi"
              cpu: "6"              
          livenessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 1800 # Увеличено, Nexus долго стартует
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 1800
            periodSeconds: 30
          volumeMounts:
            - name: nexus-data-ssd
              mountPath: /nexus-data
      volumes:
        - name: nexus-data-ssd
          persistentVolumeClaim:
            claimName: nexus-data-ssd

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  selector:
    app: nexus
  ports:
    - name: ui
      port: 8081
      targetPort: 8081
    - name: docker
      port: 8082
      targetPort: 5000

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nexus-tls
  namespace: nexus
spec:
  secretName: nexus-tls-secret
  commonName: nexus.ccsfarm.local
  dnsNames:
    - nexus.ccsfarm.local
    - registry-nexus.ccsfarm.local
  issuerRef:
    name: ccsfarm-ca-issuer
    kind: ClusterIssuer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    cert-manager.io/cluster-issuer: ccsfarm-ca-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Nexus требует, чтобы Ingress сообщал ему об HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - registry-nexus.ccsfarm.local
        - nexus.ccsfarm.local
      secretName: nexus-tls-secret
  rules:
    - host: nexus.ccsfarm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 8081
    - host: registry-nexus.ccsfarm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 8082