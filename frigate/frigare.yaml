---
apiVersion: v1
kind: Namespace
metadata:
  name: frigate
---
# Конфигурация Frigate с поддержкой NVIDIA GPU (TensorRT)
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
data:
  config.yml: |
    mqtt:
      enabled: false

    detectors:
      # Используем TensorRT для NVIDIA P104-100
      ov:
        type: tensorrt
        device: 0

    ffmpeg:
      # Аппаратное декодирование NVIDIA (NVDEC)
      hwaccel_args: preset-nvidia-h264

    go2rtc:
      streams:
        garden_main_stream:
          - rtsp://admin:12345@91.210.159.231:7011/Streaming/Channels/1
        enter_main_stream:
          - rtsp://admin:12345@91.210.159.231:7012/Streaming/Channels/1
        home_main_stream:
          - rtsp://admin:admin@91.210.159.231:7013/cam/realmonitor?channel=1&subtype=0

    cameras:
      garden:
        enabled: true
        ffmpeg:
          input_args: -rtsp_transport udp
          inputs:
            - path: rtsp://127.0.0.1:8554/garden_main_stream
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://admin:12345@91.210.159.231:7011/Streaming/Channels/2
              input_args: preset-rtsp-generic
              roles:
                - detect
        live:
          streams:
            garden_main_stream: garden_main_stream
        detect:
          enabled: true
          width: 320 
          height: 200
          fps: 3
        record:
          enabled: true 
        snapshots:
          enabled: true 
        zones:
          test1:
            coordinates: 0.02,0.283,0.976,0.288,0.978,0.974,0.02,0.968
            loitering_time: 0
        objects:
          track:
            - person
            - dog
            - cat
            - car

      enter:
        enabled: true
        ffmpeg:
          input_args: -rtsp_transport udp
          inputs:
            - path: rtsp://127.0.0.1:8554/enter_main_stream
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://admin:12345@91.210.159.231:7012/Streaming/Channels/2
              input_args: preset-rtsp-generic
              roles:
                - detect
        live:
          streams:
            enter_main_stream: enter_main_stream
        detect:
          enabled: true
          width: 320 
          height: 200
          fps: 3
        record:
          enabled: true 

      home:
        enabled: true
        ffmpeg:
          input_args: -rtsp_transport udp
          inputs:
            - path: rtsp://127.0.0.1:8554/home_main_stream
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://admin:admin@91.210.159.231:7013/cam/realmonitor?channel=1&subtype=1
              input_args: preset-rtsp-generic
              roles:
                - detect
        live:
          streams:
            home_main_stream: home_main_stream
        detect:
          enabled: true
          width: 320 
          height: 200
          fps: 3
        record:
          enabled: true 

    record:
      enabled: true
      retain:
        days: 7
        mode: all

    version: 0.16-0
---
# PVC для архива на новом NFS RAID (10.10.1.55)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-storage
  namespace: frigate
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-raid # Используем новый StorageClass
  resources:
    requests:
      storage: 100Gi
---
# Остальные PVC можно оставить на старом или перевести на новый
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
  namespace: frigate
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-raid
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tmp-cache
  namespace: frigate
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-raid
  resources:
    requests:
      storage: 10Gi
---
# Deployment Frigate
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
      annotations:
        # ЭТО КРИТИЧНО ДЛЯ CRI-O + CDI:
        # Указываем рантайму пробросить все NVIDIA библиотеки и устройства
        cdi.k8s.io/nvidia: "all"         
    spec:
      tolerations:
      - key: "gpu"
        operator: "Equal"
        value: "low-performance"
        effect: "NoSchedule"
      nodeSelector:
        gpu-performance: low        
      
      initContainers:
      - name: copy-config
        image: busybox:1.34
        command:
        - sh
        - -c
        - |
          mkdir -p /config
          cp /config-base/config.yml /config/config.yml
          chown -R 1000:1000 /config
        volumeMounts:
        - name: config-base
          mountPath: /config-base
        - name: config
          mountPath: /config
      
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "4Gi"
            cpu: "2000m"
          requests:
            nvidia.com/gpu: 1
            memory: "2Gi"
            cpu: "1000m"        
        env:
        - name: FRIGATE_RTSP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: rtsp-password
        # Параметры NVIDIA
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "all"
        volumeMounts:
        - name: config
          mountPath: /config        
        - name: storage
          mountPath: /media/frigate
        - name: tmp-cache
          mountPath: /tmp/cache
        # Разделяемая память для GPU
        - name: shm
          mountPath: /dev/shm
        securityContext:
          privileged: true
      
      volumes:
      - name: config-base
        configMap:
          name: frigate-config
      - name: config
        persistentVolumeClaim:
          claimName: frigate-config      
      - name: storage
        persistentVolumeClaim:
          claimName: frigate-storage
      - name: tmp-cache
        persistentVolumeClaim:
          claimName: tmp-cache
      # Том SHM
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
---
# Secrets для Frigate
apiVersion: v1
kind: Secret
metadata:
  name: frigate-secrets
  namespace: frigate
type: Opaque
data:
  rtsp-password: cGFzc3dvcmQ=  # password в base64
---
# Service для доступа к веб-интерфейсу
apiVersion: v1
kind: Service
metadata:
  name: frigate-service
  namespace: frigate
spec:
  selector:
    app: frigate
  ports:
  - name: web
    port: 5000
    targetPort: 5000
    nodePort: 30080
  - name: web-auth
    port: 8971
    targetPort: 8971
    nodePort: 30971
  - name: rtmp
    port: 1935
    targetPort: 1935
    nodePort: 31935
  - name: rtsp
    port: 8554
    targetPort: 8554
    nodePort: 30554
  type: NodePort
---
# Ingress для веб-интерфейса
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frigate-ingress
  namespace: frigate
  annotations:
    cert-manager.io/cluster-issuer: ccsfarm-ca-issuer
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers: "4 256k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - frigate.ccsfarm.local
    secretName: frigate-tls-secret   
  rules:
  - host: frigate.ccsfarm.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frigate-service
            port: 