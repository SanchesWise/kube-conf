apiVersion: v1
kind: Service
metadata:
  name: minio-external-exporter
  namespace: monitoring
  labels:
    k8s-app: minio-exporter
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: minio-external-exporter
  namespace: monitoring
spec:
  subsets:
    - addresses:
        - ip: 10.10.2.122 # slow
        - ip: 10.10.2.123 # fast
      ports:
        - name: http-metrics
          port: 9000
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio-external-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: minio-exporter
  endpoints:
    - port: http-metrics
      path: /minio/v2/metrics/cluster
      interval: 30s