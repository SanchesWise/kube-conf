# Запускать только на нодах с GPU
nodeSelector:
  nvidia.com/gpu.present: "true"

privileged: true

env:
  - name: NVIDIA_VISIBLE_DEVICES
    value: "all"
  - name: NVIDIA_DRIVER_CAPABILITIES
    value: "compute,utility"

extraConfig:
  user: "0"

# Если у вас есть Taints на GPU нодах, добавьте Tolerations
tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

serviceMonitor:
  enabled: true
  # Метка должна совпадать с селектором вашего Prometheus
  labels:
    release: kube-prometheus-stack
  interval: 15s

# Метрики, которые будут собираться
arguments:
  - "-f"
  - "/etc/dcgm-exporter/default-whitelist.csv"