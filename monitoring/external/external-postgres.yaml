apiVersion: v1
kind: Service
metadata:
  name: postgres-external-exporter
  namespace: monitoring
  labels:
    k8s-app: postgres-exporter
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 9187
      targetPort: 9187
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres-external-exporter
  namespace: monitoring
spec:
  subsets:
    - addresses:
        - ip: 10.10.2.131
        - ip: 10.10.2.132
        - ip: 10.10.2.133
      ports:
        - name: http-metrics
          port: 9187
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-external-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: postgres-exporter
  endpoints:
    - port: http-metrics
      interval: 30s