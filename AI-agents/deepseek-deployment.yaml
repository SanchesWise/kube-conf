apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-r1
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepseek-r1
  template:
    metadata:
      labels:
        app: deepseek-r1
    spec:
      # 1. Ваш кастомный RuntimeClass
      runtimeClassName: nvidia
      
      # Использовать точное имя Label из вашего вывода
      nodeSelector:
        gpu-performance: "high"
      
      # Использовать точное имя Taint из вашего вывода
      tolerations:
      - key: "gpu"
        operator: "Equal"
        value: "high-performance"
        effect: "NoSchedule"

      containers:
      - name: vllm-engine
        image: vllm/vllm-openai:latest
        resources:
          limits:
            nvidia.com/gpu: 2
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        # Путь к нашему быстрому NVMe
        - name: HF_HOME
          value: "/model-cache"
        args:
        # Используем явные флаги для стабильности в K8s
        - "--model"
        - "casperhansen/deepseek-r1-distill-llama-70b-awq"
        - "--quantization"
        - "awq"
        - "--tensor-parallel-size"
        - "2"
        # Для 2x3090 и 70B модели это критический параметр:
        - "--max-model-len"
        - "8192" 
        - "--gpu-memory-utilization"
        - "0.90"
        - "--trust-remote-code"
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        # Подключаем ваши логи, как вы сделали ранее
        - name: log-volume
          mountPath: /var/log
      
      volumes:
      - name: model-cache
        hostPath:
          path: /mnt/nvme-storage
          type: DirectoryOrCreate
      - name: log-volume
        hostPath:
          path: /var/log
          type: Directory       