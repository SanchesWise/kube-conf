apiVersion: v1
kind: Service
metadata:
  name: proxmox-nodes-exporter
  namespace: monitoring
  labels:
    k8s-app: node-exporter
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 9100
      targetPort: 9100
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-nodes-exporter
  namespace: monitoring
spec:
  subsets:
    - addresses:
        - ip: 10.10.1.53
        - ip: 10.10.1.54
        - ip: 10.10.1.55
      ports:
        - name: http-metrics
          port: 9100
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-nodes-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack # Должен совпадать с меткой вашего Prometheus
spec:
  selector:
    matchLabels:
      k8s-app: node-exporter
  endpoints:
    - port: http-metrics
      interval: 30s