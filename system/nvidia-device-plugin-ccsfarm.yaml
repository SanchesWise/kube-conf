metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      # 1. Ограничиваем запуск только нодами с GPU
      nodeSelector:
        nvidia.com/gpu.present: "true"
      # Позволяем запускаться на нодах с любыми тейнтами (включая low-performance)
      tolerations:
      - operator: Exists
        effect: NoSchedule

      # Убираем nodeSelector, чтобы он сам нашел GPU через NVML
      containers:
      - image: nvcr.io/nvidia/k8s-device-plugin:v0.14.0
        name: nvidia-device-plugin-ctr
        env:
        - name: LD_LIBRARY_PATH
          value: /usr/lib64
        securityContext:
          privileged: true
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
        - name: lib64
          mountPath: /usr/lib64
          readOnly: true
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: lib64
        hostPath:
          path: /usr/lib64
