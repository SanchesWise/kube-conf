apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-r1
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepseek-r1
  template:
    metadata:
      labels:
        app: deepseek-r1
    spec:
      # 1. Ваш кастомный RuntimeClass
      runtimeClassName: nvidia
      
      # Использовать точное имя Label из вашего вывода
      nodeSelector:
        gpu-performance: "high"
      
      # Использовать точное имя Taint из вашего вывода
      tolerations:
      - key: "gpu"
        operator: "Equal"
        value: "high-performance"
        effect: "NoSchedule"

      containers:
      - name: vllm-engine
        image: vllm/vllm-openai:latest # На 2026 год актуальный стек
        resources:
          limits:
            nvidia.com/gpu: 2 # Захватываем обе 3090
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        args:
        - "serve" # Согласно новым правилам vllm v0.13+
        - "casperhansen/deepseek-r1-distill-llama-70b-awq" 
        - "--tensor-parallel-size"
        - "2"
        - "--max-model-len"
        - "32768" # Уменьшим до 16к для гарантии входа в память
        - "--gpu-memory-utilization"
        - "0.95"
        - "--quantization"
        - "awq"
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: nvme-volume
          mountPath: /model-cache
      
      volumes:
      - name: nvme-volume
        hostPath:
          path: /mnt/nvme-storage
          type: DirectoryOrCreate        